<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disk Cleaner</title>
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
  <link rel="stylesheet" href="/assets/css/system.css" />
  <link rel="stylesheet" href="/assets/css/cleaner.css" />
</head>
<body>
  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main id="view" class="view"></main>
  </div>

  <!-- Confirmation modal (used by the cleaner page) -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h2 id="modal-title">Confirm deletion</h2>
      <p id="modal-body"></p>
      <div class="modal-actions">
        <button type="button" id="modal-cancel" class="btn btn-ghost">Cancel</button>
        <button type="button" id="modal-confirm" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <!-- Chart.js (vendored, UMD) exposes a global `Chart` before the app boots. -->
  <script src="/assets/js/vendor/chart.umd.js"></script>
  <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
