<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disk Cleaner 🧹</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🧹</span>
      <div>
        <div class="brand-title">DISK CLEANER</div>
        <div class="brand-sub">Smart Disk Space Analyzer</div>
      </div>
    </div>
    <div id="topbar-stats" class="topbar-stats"></div>
  </header>

  <main id="app"></main>

  <!-- Confirmation modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h2 id="modal-title">Confirm deletion</h2>
      <p id="modal-body"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
        <button id="modal-confirm" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
